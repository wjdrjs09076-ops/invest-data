name: Update banners.json

on:
  schedule:
    - cron: "15 */3 * * *"   # 3시간마다 (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Build banners
        run: python scripts/build_banners.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/banners.json
          git commit -m "Update banners.json" || echo "No changes to commit"
          git push

