name: Build score snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * *" # UTC 21:30 = KST 06:30

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build score_snapshot.json
        env:
          PORTAL_BASE_URL: ${{ secrets.PORTAL_BASE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python scripts/build_score_snapshot.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/score_snapshot.json
          git commit -m "data: update score_snapshot.json" || echo "No changes"
          git push
