name: Update live performance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 1-5" # UTC 22:00 (KST 07:00) 평일 — 미국 장 마감 1시간 후

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Update live_performance.json
        run: |
          python scripts/update_live_performance.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_performance.json
          git commit -m "data: update live_performance.json [$(date -u '+%Y-%m-%d')]" || echo "No changes"
          git push
